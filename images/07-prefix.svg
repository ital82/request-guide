<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="'Yu Gothic','Meiryo',sans-serif">
  <rect width="760" height="320" fill="#f0f2f5"/>
  <!-- header -->
  <rect x="0" y="0" width="760" height="56" fill="#028090"/>
  <text x="200" y="36" font-size="20" font-weight="bold" fill="#ffffff">🎵 alice</text>
  <rect x="470" y="16" width="110" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="525" y="34" text-anchor="middle" font-size="13" fill="#ffffff">✅ 認証済み</text>

  <!-- 設定 card -->
  <rect x="30" y="84" width="700" height="150" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="55" y="120" font-size="18" font-weight="bold" fill="#333">⚙ 設定</text>
  <text x="55" y="148" font-size="14" fill="#555">リクエストを拾うトリガー文字列（合言葉）</text>

  <!-- input + save -->
  <rect x="55" y="162" width="300" height="42" rx="6" fill="#fafafa" stroke="#cccccc"/>
  <text x="72" y="188" font-size="16" fill="#333">#req</text>
  <rect x="365" y="162" width="100" height="42" rx="6" fill="#028090"/>
  <text x="415" y="188" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">保存</text>
  <text x="485" y="188" font-size="13" fill="#02C39A">← 合言葉を入れて「保存」</text>

  <!-- example callout -->
  <rect x="30" y="252" width="700" height="50" rx="8" fill="#eef7f8" stroke="#cfe0e3"/>
  <text x="48" y="274" font-size="13" fill="#1c6b75">視聴者はこの合言葉を先頭につけて投稿 →　例：「#req ヨルシカ - 花に亡霊」</text>
  <text x="48" y="293" font-size="12" fill="#5a7d83">一度「保存」すればずっと有効。毎回決め直す必要はありません。</text>
</svg>
