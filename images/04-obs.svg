<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="'Yu Gothic','Meiryo',sans-serif">
  <rect width="760" height="430" fill="#2b2b2b"/>
  <text x="30" y="36" font-size="16" font-weight="bold" fill="#ffffff">OBS：ソース → ＋ →「ブラウザ」を追加</text>

  <!-- dialog -->
  <rect x="120" y="60" width="520" height="330" rx="8" fill="#3c3c3c" stroke="#555"/>
  <text x="145" y="92" font-size="15" font-weight="bold" fill="#eaeaea">プロパティ：ブラウザ</text>

  <!-- URL field -->
  <text x="145" y="130" font-size="13" fill="#bbbbbb">URL</text>
  <rect x="145" y="140" width="470" height="34" rx="4" fill="#2b2b2b" stroke="#666"/>
  <text x="158" y="162" font-size="13" fill="#7fd3dd">https://（サーバーURL）/overlay/alice</text>

  <!-- width/height -->
  <text x="145" y="205" font-size="13" fill="#bbbbbb">幅</text>
  <rect x="145" y="215" width="150" height="32" rx="4" fill="#2b2b2b" stroke="#666"/>
  <text x="158" y="236" font-size="13" fill="#eaeaea">1920</text>
  <text x="330" y="205" font-size="13" fill="#bbbbbb">高さ</text>
  <rect x="330" y="215" width="150" height="32" rx="4" fill="#2b2b2b" stroke="#666"/>
  <text x="343" y="236" font-size="13" fill="#eaeaea">1080</text>

  <!-- checkbox -->
  <rect x="145" y="270" width="18" height="18" rx="3" fill="#2b2b2b" stroke="#888"/>
  <text x="152" y="285" font-size="13" fill="#02C39A">✓</text>
  <text x="172" y="285" font-size="13" fill="#dddddd">表示されていないときにソースをシャットダウン（任意）</text>

  <rect x="145" y="300" width="18" height="18" rx="3" fill="#2b2b2b" stroke="#888"/>
  <text x="152" y="315" font-size="13" fill="#02C39A">✓</text>
  <text x="172" y="315" font-size="13" fill="#dddddd">シーンがアクティブになったらブラウザの表示を更新</text>

  <!-- OK -->
  <rect x="505" y="345" width="110" height="34" rx="5" fill="#028090"/>
  <text x="560" y="367" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">OK</text>
</svg>
