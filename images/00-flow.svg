<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" font-family="'Yu Gothic','Meiryo',sans-serif">
  <rect width="820" height="200" fill="#f0f2f5"/>
  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#028090">配信者がやることの全体の流れ</text>
  <!-- steps -->
  <g>
    <rect x="20"  y="70" width="140" height="80" rx="10" fill="#ffffff" stroke="#028090" stroke-width="2"/>
    <text x="90"  y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#028090">①</text>
    <text x="90"  y="126" text-anchor="middle" font-size="14" fill="#333">ログイン</text>

    <rect x="190" y="70" width="140" height="80" rx="10" fill="#ffffff" stroke="#028090" stroke-width="2"/>
    <text x="260" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#028090">②</text>
    <text x="260" y="120" text-anchor="middle" font-size="14" fill="#333">YouTube配信</text>
    <text x="260" y="138" text-anchor="middle" font-size="14" fill="#333">を「開始」</text>

    <rect x="360" y="70" width="140" height="80" rx="10" fill="#ffffff" stroke="#028090" stroke-width="2"/>
    <text x="430" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#028090">③</text>
    <text x="430" y="120" text-anchor="middle" font-size="14" fill="#333">合言葉(プレ</text>
    <text x="430" y="138" text-anchor="middle" font-size="14" fill="#333">フィックス)設定</text>

    <rect x="530" y="70" width="140" height="80" rx="10" fill="#ffffff" stroke="#028090" stroke-width="2"/>
    <text x="600" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#028090">④</text>
    <text x="600" y="120" text-anchor="middle" font-size="14" fill="#333">URLをコピーし</text>
    <text x="600" y="138" text-anchor="middle" font-size="14" fill="#333">OBSに貼る</text>

    <rect x="700" y="70" width="100" height="80" rx="10" fill="#ffffff" stroke="#02C39A" stroke-width="2"/>
    <text x="750" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#02C39A">⑤</text>
    <text x="750" y="120" text-anchor="middle" font-size="13" fill="#333">配信中はタブ</text>
    <text x="750" y="138" text-anchor="middle" font-size="13" fill="#333">を開いたまま</text>
  </g>
  <!-- arrows -->
  <g fill="#028090">
    <polygon points="165,110 185,110 175,100 175,120"/>
    <polygon points="335,110 355,110 345,100 345,120"/>
    <polygon points="505,110 525,110 515,100 515,120"/>
    <polygon points="675,110 695,110 685,100 685,120"/>
  </g>
  <text x="410" y="185" text-anchor="middle" font-size="13" fill="#777">※ サーバーの起動は管理者が行います。配信者は起動済みの画面URLを開くところから始めます。</text>
</svg>
