<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="'Yu Gothic','Meiryo',sans-serif">
  <rect width="760" height="320" fill="#f0f2f5"/>
  <!-- header -->
  <rect x="0" y="0" width="760" height="56" fill="#028090"/>
  <text x="24" y="35" font-size="15" fill="#bfe6ea">← ルーム一覧</text>
  <text x="200" y="36" font-size="20" font-weight="bold" fill="#ffffff">🎵 alice</text>
  <rect x="470" y="16" width="120" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="530" y="34" text-anchor="middle" font-size="13" fill="#ffffff">🔒 認証が必要</text>
  <rect x="600" y="16" width="145" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="672" y="34" text-anchor="middle" font-size="12" fill="#ffffff">💤 スリープ防止:起動中</text>

  <!-- login card -->
  <rect x="180" y="110" width="400" height="150" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="210" y="150" font-size="18" font-weight="bold" fill="#333">🔑 ログイン</text>
  <rect x="210" y="170" width="230" height="42" rx="6" fill="#fafafa" stroke="#cccccc"/>
  <text x="224" y="196" font-size="14" fill="#999">ルームパスワード</text>
  <rect x="450" y="170" width="100" height="42" rx="6" fill="#028090"/>
  <text x="500" y="196" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">ログイン</text>
  <text x="210" y="240" font-size="13" fill="#777">管理者から渡された「ルーム名」と「パスワード」を使います。</text>

  <text x="380" y="295" text-anchor="middle" font-size="13" fill="#555">URL例：  https://（サーバーURL）/admin/alice</text>
</svg>
